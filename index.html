        /* 区块之间只用间距拉节奏，避免多条横线切碎版面 */
        .layout-stack {

            gap: 3.25rem;

        @media (min-width: 768px) {
            .layout-stack {
                gap: 4.5rem;

        /* 主栏一屏收尾：压缩纵向节奏；引言区不再吸底 */
        #main-content.layout-stack {

            box-sizing: border-box;

            .font-quote {

        .hero-title {

        .section-eyebrow {

        .quote-container {
            position: relative;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.75s cubic-bezier(0.25, 0.1, 0.25, 1),
                transform 0.75s cubic-bezier(0.25, 0.1, 0.25, 1);
            margin-left: auto;
            margin-right: auto;
            padding: 0.35rem 0.5rem 0.5rem;
            text-align: center;
            perspective: 560px;
            -webkit-tap-highlight-color: transparent;
        }

        .quote-container:focus {
            outline: none;
        }

        .quote-container:focus-visible {
            outline: 2px solid rgba(99, 102, 241, 0.4);
            outline-offset: 4px;
            border-radius: 10px;
        }

        .quote-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 成对引号：挂在正文块左上角 / 右下角，不占单独一行 */
        #quote.font-quote {
            position: relative;
            padding-left: 0.65em;
            padding-right: 0.65em;
        }

        #quote.font-quote::before,
        #quote.font-quote::after {
            position: absolute;
            font-family: 'Times New Roman', 'Songti SC', 'STSong', Georgia, 'Palatino Linotype', serif;
            font-size: 1.42em;
            line-height: 1;
            font-weight: 400;
            color: rgba(99, 102, 241, 0.28);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.55s ease 0.1s;
        }

        .quote-container.show #quote.font-quote::before,
        .quote-container.show #quote.font-quote::after {
            opacity: 1;
        }

        #quote.font-quote::before {
            content: '\201C';
            left: 0;
            top: 0.02em;
        }

        #quote.font-quote::after {
            content: '\201D';
            right: 0;
            bottom: 0.08em;
        }

        #quote.font-quote .quote-glyph {
            position: relative;
            z-index: 1;
        }

        /* 逐词/逐字：略轻的模糊与倾角，适配小字号 */
        .quote-glyph {
            display: inline-block;
            opacity: 0;
            transform-origin: 50% 100%;
            filter: blur(7px);
            transform: translateY(0.28em) rotateX(-34deg);
        }

        .quote-container.quote-play .quote-glyph {
            animation: quoteGlyphReveal 0.52s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: calc(var(--qi, 0) * 36ms);
        }

        @keyframes quoteGlyphReveal {
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0) rotateX(0deg);
            }
        }

        #quote-author {
            opacity: 0;
            transform: translateY(6px);
            filter: blur(6px);
        }

        .quote-container.quote-play #quote-author {
            animation: quoteAuthorReveal 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: var(--quote-author-delay, 0.45s);
        }

        @keyframes quoteAuthorReveal {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .quote-container.show #quote.font-quote::before,
            .quote-container.show #quote.font-quote::after {
                opacity: 1;
                transition: none;
            }

            .quote-container.quote-play .quote-glyph {
                animation: none;
                opacity: 1;
                filter: none;
                transform: none;
            }

            #quote-author {
                opacity: 1;
                filter: none;
                transform: none;
            }

            .quote-container.quote-play #quote-author {
                animation: none;
            }
        }
        
        /* 开场头像保留装饰环；正文区内头像改为干净阴影 */

        /* 初始布局样式 */
        .initial-layout {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            z-index: 10;
            transition: all 0.8s ease;
            pointer-events: none;
        }
        
        .initial-layout.minimized {
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease, opacity 0.8s ease, visibility 0s 0.8s;
        }
        
        .initial-avatar {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
        }
        
        .initial-name {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .initial-title {
            font-size: 1.5rem;
        }
        
        /* 内容容器 */
        .content-container {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease;
        }
        
        .content-container.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 主内容区域 */
        #main-content {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        #main-content.show {
            opacity: 1;
        }
        
        /* 头像过渡动画：不拦截点击，避免盖住主内容期间邮箱等链接无法点 */
        .avatar-transition {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 20;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.8), 0 0 0 10px rgba(156, 163, 175, 0.2);
        }
        
        .avatar-transition img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 淡雅底衬，衬托磨砂卡片 */
        body.min-h-screen.antialiased {
            background-color: #f2f2f6;
            background-image:
                radial-gradient(ellipse 120% 55% at 50% -25%, rgba(255, 255, 255, 0.85), transparent 52%),
                radial-gradient(ellipse 55% 38% at 95% 35%, rgba(220, 225, 238, 0.35), transparent 58%),
                radial-gradient(ellipse 50% 36% at 6% 65%, rgba(228, 230, 240, 0.4), transparent 56%);
        }

        /* 确保页面不会水平滚动 */
        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
        
        .avatar-img {
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* 开场头像：不依赖 load 事件才显示，避免 complete/error 竞态导致一直透明 */
        #initial-layout .avatar-img {
            opacity: 1;
        }
        
        .avatar-img.loaded {
            opacity: 1;
        }

        /* 点击邮箱：复制成功后的轻提示（桌面端无邮件客户端时至少可粘贴） */
        #mail-toast {
            position: fixed;
            z-index: 10000;
            left: 50%;
            bottom: max(1.25rem, env(safe-area-inset-bottom, 0px));
            transform: translateX(-50%) translateY(120%);
            max-width: min(22rem, calc(100vw - 2rem));
            padding: 0.65rem 1rem;
            font-size: 0.875rem;
            line-height: 1.45;
            text-align: center;
            color: #1d1d1f;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.25s;
        }

        #mail-toast.mail-toast--visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>

    <!-- 初始布局 - 头像、名字和身份 -->
    <div id="initial-layout" class="initial-layout">

    <!-- 主内容区域 -->
    <div id="main-content" class="page-shell layout-stack pt-8 pb-0 md:pt-12">
        <header class="flex flex-col items-center text-center">

                     src="https://foruda.gitee.com/avatar/1748226361206753749/15870069_abcreatoris_1748226361.png"

                     onerror="this.src='https://cdn-avatars.huggingface.co/v1/production/uploads/noauth/R1mAu5TR8RGL8Ig0d0bd4.jpeg'">

        <section id="quote-section" aria-label="引言">
            <div id="quote-container" class="quote-container cursor-pointer select-none" role="button" tabindex="0" aria-label="点击或按回车切换至下一条引言" title="点击切换下一条">
                <p id="quote" class="font-quote"></p>

    <script>
        /** 境内 CN → 中文；境外 → 英文。失败时按浏览器语言回退。 */
        let siteLocale = 'zh';

        /** 格言列表（由 config.{zh|en}.json 的 quotes 填充） */
        let quotesFromConfig = [];

        /** 当前展示的格言在列表中的下标 */
        let quoteDisplayIndex = 0;

        /** 自动切换下一条格言的间隔（5.20 秒） */
        const QUOTE_AUTO_ROTATE_MS = 5200;

        /** 自动轮播计时器；手动点击后会 clear 再 schedule，重新从完整间隔计起 */
        let quoteAutoRotateTimerId = null;

        function scheduleQuoteAutoRotate() {
            clearTimeout(quoteAutoRotateTimerId);
            quoteAutoRotateTimerId = setTimeout(function () {
                updateQuote(true);
                scheduleQuoteAutoRotate();
            }, QUOTE_AUTO_ROTATE_MS);
        }

        /** 请求失败时的极简兜底（与 config.*.json 结构一致） */
        const CONFIG_FALLBACK_ZH = {
            ui: {
                htmlLang: 'zh-CN',
                pageTitle: '陈新钰的个人主页',
                nameDisplay: '陈新钰',
                tagline: '软件开发者',
                avatarAlt: '陈新钰的头像',
                socialNavAria: '社交网络',
                linksSectionAria: '链接与作品',
                contentLinksNavAria: '站内与常用链接',
                quoteSectionAria: '引言',
                quoteToggleAria: '点击或按回车切换至下一条引言',
                quoteToggleTitle: '点击切换下一条'
            },
            social: [
                { href: 'https://github.com/ABCreatoris', label: 'GitHub', iconClass: 'fab fa-github', cssClass: 'github-icon' }
            ],
            contentLinks: [
                { title: '技术博客', description: '', url: 'https://blog.abcreatoris.com' }
            ],
            quotes: [{ text: '求知若饥，虚心若愚。', author: 'Steve Jobs' }]
        };

        const CONFIG_FALLBACK_EN = {
            ui: {
                htmlLang: 'en',
                pageTitle: 'Chen Xinyu — Personal page',
                nameDisplay: 'Chen Xinyu',
                tagline: 'Software developer',
                avatarAlt: 'Portrait of Chen Xinyu',
                socialNavAria: 'Social links',
                linksSectionAria: 'Links & work',
                contentLinksNavAria: 'Site and quick links',
                quoteSectionAria: 'Quote',
                quoteToggleAria: 'Click or press Enter for the next quote',
                quoteToggleTitle: 'Next quote'
            },
            social: [
                { href: 'https://github.com/ABCreatoris', label: 'GitHub', iconClass: 'fab fa-github', cssClass: 'github-icon' }
            ],
            contentLinks: [
                { title: 'Tech blog', description: '', url: 'https://blog.abcreatoris.com' }
            ],
            quotes: [{ text: 'Stay hungry. Stay foolish.', author: 'Steve Jobs' }]
        };

        /** 社交平台 SVG（小红书不在 Font Awesome brands 中时改用） */
        const SOCIAL_SVG_XHS =
            '<svg class="xhs-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="5.5" fill="currentColor"/><path fill="#ffffff" d="M7 7h10v2H7zm0 4h7v2H7zm0 4h10v2H7z"/></svg>';

        let siteSocialLinks = [];
        let siteContentLinks = [];

        /**
         * 与当前页面所在「目录」解析 config.zh.json / config.en.json 等。
         * 避免 GitHub Pages 类地址为 …/repo（无尾斜杠）时相对路径落到站点根目录 404。
         */
        function resolveAssetUrl(filename) {
            const baseEl = document.querySelector('base[href]');
            if (baseEl && baseEl.href) {
                return new URL(filename, baseEl.href).href;
            }
            let path = window.location.pathname || '/';
            if (!path.endsWith('/')) {
                const last = path.split('/').pop() || '';
                if (/\.[a-z0-9]+$/i.test(last)) {
                    path = path.replace(/\/[^/]+$/, '/');
                } else {
                    path = path + '/';
                }
            }
            return new URL(filename, window.location.origin + path).href;
        }

        function localeFromNavigator() {
            const nav = (navigator.languages && navigator.languages[0]) || navigator.language || '';
            return /^zh/i.test(nav) ? 'zh' : 'en';
        }

        async function resolveSiteLocale() {
            const ctrl = new AbortController();
            const tid = setTimeout(function () {
                ctrl.abort();
            }, 2800);
            try {
                const res = await fetch('https://get.geojs.io/v1/ip/country.json', {
                    signal: ctrl.signal,
                    cache: 'no-store'
                });
                if (!res.ok) throw new Error('geo http');
                const geo = await res.json();
                const code = String(geo.country || geo.country_code || '').toUpperCase();
                if (code === 'CN') return 'zh';
                return 'en';
            } catch (e) {
                return localeFromNavigator();
            } finally {
                clearTimeout(tid);
            }
        }

        function isValidSiteConfig(data) {
            if (!data || typeof data !== 'object') return false;
            if (!data.ui || typeof data.ui !== 'object') return false;
            if (!Array.isArray(data.social) || data.social.length === 0) return false;
            if (!Array.isArray(data.contentLinks) || data.contentLinks.length === 0) return false;
            if (!Array.isArray(data.quotes) || data.quotes.length === 0) return false;
            return true;
        }

        function applyUiFromObject(t) {
            document.documentElement.lang = t.htmlLang;
            document.title = t.pageTitle;

            document.querySelectorAll('.i18n-hero-name').forEach(function (el) {
                el.textContent = t.nameDisplay;
            });

            const tagInitial = document.getElementById('tagline-initial');
            const tagMain = document.getElementById('tagline-main');
            if (tagInitial) tagInitial.textContent = t.tagline;
            if (tagMain) tagMain.textContent = t.tagline;

            ['profile-avatar', 'transition-avatar', 'final-avatar'].forEach(function (id) {
                const el = document.getElementById(id);
                if (el) el.setAttribute('alt', t.avatarAlt);
            });

            const socialNav = document.getElementById('social-icons');
            if (socialNav) socialNav.setAttribute('aria-label', t.socialNavAria);

            const linksSection = document.getElementById('links-section');
            if (linksSection) linksSection.setAttribute('aria-label', t.linksSectionAria);

            const cardsNav = document.getElementById('cards-container');
            if (cardsNav) cardsNav.setAttribute('aria-label', t.contentLinksNavAria);

            const quoteSection = document.getElementById('quote-section');
            if (quoteSection) quoteSection.setAttribute('aria-label', t.quoteSectionAria);

            const quoteContainer = document.getElementById('quote-container');
            if (quoteContainer) {
                quoteContainer.setAttribute('aria-label', t.quoteToggleAria);
                quoteContainer.setAttribute('title', t.quoteToggleTitle);
            }
        }

        function filterQuotesList(list) {
            return (Array.isArray(list) ? list : []).filter(function (q) {
                return q && typeof q.text === 'string' && typeof q.author === 'string';
            });
        }

        function normalizeLinksFromConfig(data) {
            const social = Array.isArray(data.social) ? data.social : [];
            const contentLinks = Array.isArray(data.contentLinks) ? data.contentLinks : [];

            const socialNorm = social.filter(function (s) {
                if (!s || typeof s.label !== 'string' || !s.label.length) return false;
                if (s.iconKind === 'xiaohongshu') {
                    return typeof s.href === 'string' && s.href.length > 0;
                }
                if (s.iconKind === 'wechat') {
                    return (
                        typeof s.wechatId === 'string' &&
                        s.wechatId.trim().length > 0 &&
                        typeof s.iconClass === 'string' &&
                        s.iconClass.length > 0 &&
                        typeof s.href === 'string'
                    );
                }
                if (s.iconKind === 'qq') {
                    var uq = typeof s.qqUin === 'string' ? String(s.qqUin).replace(/\D/g, '') : '';
                    return (
                        uq.length >= 5 &&
                        uq.length <= 14 &&
                        typeof s.iconClass === 'string' &&
                        s.iconClass.length > 0 &&
                        typeof s.href === 'string'
                    );
                }
                if (typeof s.href !== 'string') return false;
                return typeof s.iconClass === 'string' && s.iconClass.length > 0;
            });

            const linksNorm = contentLinks.filter(function (c) {
                return c && typeof c.url === 'string' && typeof c.title === 'string' && c.title.length > 0;
            });

            if (socialNorm.length === 0 || linksNorm.length === 0) {
                throw new Error('links empty');
            }

            siteSocialLinks = socialNorm.map(function (s) {
                var ik =
                    s.iconKind === 'xiaohongshu'
                        ? 'xiaohongshu'
                        : s.iconKind === 'wechat'
                          ? 'wechat'
                          : s.iconKind === 'qq'
                            ? 'qq'
                            : '';
                return {
                    href: s.href,
                    label: s.label,
                    iconClass: typeof s.iconClass === 'string' ? s.iconClass : '',
                    iconKind: ik,
                    cssClass: typeof s.cssClass === 'string' ? s.cssClass : '',
                    wechatId: typeof s.wechatId === 'string' ? s.wechatId.trim() : '',
                    qqUin:
                        typeof s.qqUin === 'string' ? String(s.qqUin).replace(/\D/g, '') : ''
                };
            });

            siteContentLinks = linksNorm.map(function (c) {
                return {
                    title: c.title,
                    description: typeof c.description === 'string' ? c.description : '',
                    url: c.url
                };
            });
        }

        async function fetchSiteConfig(loc) {
            try {
                const res = await fetch(resolveAssetUrl('config.' + loc + '.json'), { cache: 'no-store' });
                if (!res.ok) return null;
                const data = await res.json();
                return isValidSiteConfig(data) ? data : null;
            } catch (e) {
                return null;
            }
        }

        async function loadSiteConfig() {
            let data = await fetchSiteConfig(siteLocale);
            if (!data) {
                const altLoc = siteLocale === 'zh' ? 'en' : 'zh';
                data = await fetchSiteConfig(altLoc);
                if (data) siteLocale = altLoc;
            }
            if (!data) {
                data = siteLocale === 'en' ? CONFIG_FALLBACK_EN : CONFIG_FALLBACK_ZH;
            }
            try {
                applyUiFromObject(data.ui);
                normalizeLinksFromConfig(data);
                quotesFromConfig = filterQuotesList(data.quotes);
            } catch (e) {
                const fb = siteLocale === 'en' ? CONFIG_FALLBACK_EN : CONFIG_FALLBACK_ZH;
                applyUiFromObject(fb.ui);
                normalizeLinksFromConfig(fb);
                quotesFromConfig = filterQuotesList(fb.quotes);
            }
            if (quotesFromConfig.length === 0) {
                quotesFromConfig = filterQuotesList(
                    (siteLocale === 'en' ? CONFIG_FALLBACK_EN : CONFIG_FALLBACK_ZH).quotes
                );
            }
        }

        function getQuoteList() {
            if (quotesFromConfig.length) return quotesFromConfig;
            return filterQuotesList((siteLocale === 'en' ? CONFIG_FALLBACK_EN : CONFIG_FALLBACK_ZH).quotes);
        }

        
        // 判断是否英文
        function isEnglish(text) {
            return /^[A-Za-z0-9\s.,'"!?;:()\-]+$/.test(text);
        }

        function prefersReducedMotion() {
            return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        /** 含中日韩则按字拆分，否则按英文词（空白保留为不动画文本节点） */
        function segmentQuoteGlyphs(text) {
            const hasCjk = /[\u3040-\u30ff\u3400-\u9fff\uf900-\ufaff]/.test(text);
            const segments = [];
            if (hasCjk) {
                for (const ch of text) {
                    segments.push({ text: ch, animate: !/\s/.test(ch) });
                }
            } else {
                text.split(/(\s+)/).forEach(function (part) {
                    if (!part) return;
                    if (/^\s+$/.test(part)) segments.push({ text: part, animate: false });
                    else segments.push({ text: part, animate: true });
                });
            }
            return segments;
        }

        function fillQuoteGlyphs(quoteElem, text) {
            quoteElem.textContent = '';
            let idx = 0;
            segmentQuoteGlyphs(text).forEach(function (seg) {
                if (!seg.animate) {
                    quoteElem.appendChild(document.createTextNode(seg.text));
                    return;
                }
                const span = document.createElement('span');
                span.className = 'quote-glyph';
                span.textContent = seg.text;
                span.style.setProperty('--qi', String(idx));
                idx += 1;
                quoteElem.appendChild(span);
            });
            return idx;
        }
        
        /**
         * 更新格言显示（逐词/逐字动画 + 署名错峰）。
         * @param {boolean} advanceNext 为 true 时先切到下一条（顺序循环），再渲染；首次展示请传 false。
         */
        function updateQuote(advanceNext) {
            const list = getQuoteList();
            if (list.length === 0) return;

            if (advanceNext === true) {
                quoteDisplayIndex = (quoteDisplayIndex + 1) % list.length;
            }

            const quote = list[quoteDisplayIndex];

            const container = document.getElementById('quote-container');
            const quoteElem = document.getElementById('quote');
            const authorEl = document.getElementById('quote-author');

            if (prefersReducedMotion()) {
                container.classList.remove('quote-play');
                quoteElem.textContent = quote.text;
                if (isEnglish(quote.text)) quoteElem.setAttribute('lang', 'en');
                else quoteElem.removeAttribute('lang');
                authorEl.textContent = '\u2014 ' + quote.author;
                authorEl.classList.toggle('quote-attribution-cn', /[\u4e00-\u9fff]/.test(quote.author));
                return;
            }

            container.classList.remove('quote-play');
            void container.offsetWidth;

            if (isEnglish(quote.text)) quoteElem.setAttribute('lang', 'en');
            else quoteElem.removeAttribute('lang');

            const glyphCount = fillQuoteGlyphs(quoteElem, quote.text);
            authorEl.textContent = '\u2014 ' + quote.author;
            authorEl.classList.toggle('quote-attribution-cn', /[\u4e00-\u9fff]/.test(quote.author));

            let authorDelaySec = 0.22 + glyphCount * 0.036;
            container.style.setProperty('--quote-author-delay', authorDelaySec + 's');

            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    container.classList.add('quote-play');
                });
            });
        }
        
        function showMailToast(message) {
            var el = document.getElementById('mail-toast');
            if (!el) {
                el = document.createElement('div');
                el.id = 'mail-toast';
                el.setAttribute('role', 'status');
                el.setAttribute('aria-live', 'polite');
                document.body.appendChild(el);
            }
            el.textContent = message;
            el.classList.add('mail-toast--visible');
            clearTimeout(showMailToast._hideTimer);
            showMailToast._hideTimer = setTimeout(function () {
                el.classList.remove('mail-toast--visible');
            }, 3200);
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                return navigator.clipboard.writeText(text);
            }
            return new Promise(function (resolve, reject) {
                try {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    ta.setAttribute('readonly', '');
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    ta.setSelectionRange(0, text.length);
                    var ok = document.execCommand('copy');
                    document.body.removeChild(ta);
                    ok ? resolve() : reject(new Error('execCommand'));
                } catch (err) {
                    reject(err);
                }
            });
        }

        /** 先复制地址再打开 mailto：桌面端无客户端时仍可粘贴到网页邮箱 */
        function bindMailtoClick(anchor, mailtoHref) {
            if (!anchor || typeof mailtoHref !== 'string' || !/^mailto:/i.test(mailtoHref)) return;
            var addr = mailtoHref.replace(/^mailto:/i, '').split('?')[0];
            var msg =
                siteLocale === 'zh'
                    ? '复制邮件地址成功。'
                    : 'Email address copied.';
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                copyTextToClipboard(addr)
                    .then(function () {
                        showMailToast(msg);
                    })
                    .catch(function () {
                        showMailToast(siteLocale === 'zh' ? '请手动复制邮箱：' + addr : 'Copy manually: ' + addr);
                    })
                    .then(function () {
                        /* 稍晚再打开 mailto，让底部提示先出现、可读 */
                        window.setTimeout(function () {
                            window.location.href = mailtoHref;
                        }, 520);
                    });
            });
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            if (!container) return;
            container.innerHTML = '';

            siteContentLinks.forEach(function (item, index) {
                if (index > 0) {
                    const sep = document.createElement('span');
                    sep.className = 'content-links__sep';
                    sep.setAttribute('aria-hidden', 'true');
                    sep.textContent = '\u00b7';
                    container.appendChild(sep);
                }

                const a = document.createElement('a');
                a.href = item.url;
                a.className = 'card content-links__a';
                const titleSpan = document.createElement('span');
                titleSpan.className = 'content-links__title';
                titleSpan.textContent = item.title;
                a.appendChild(titleSpan);
                if (typeof item.description === 'string' && item.description.length > 0) {
                    a.setAttribute('aria-label', item.title + '：' + item.description);
                    a.title = item.description;
                    const descSpan = document.createElement('span');
                    descSpan.className = 'content-links__desc';
                    descSpan.textContent = item.description;
                    descSpan.setAttribute('aria-hidden', 'true');
                    a.appendChild(descSpan);
                }
                if (/^mailto:/i.test(item.url)) {
                    var mailAddr = item.url.replace(/^mailto:/i, '').split('?')[0];
                    a.title = a.title ? mailAddr + ' — ' + a.title : mailAddr;
                    bindMailtoClick(a, item.url);
                }
                if (/^https?:\/\//i.test(item.url)) {
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                }

                container.appendChild(a);

                setTimeout(function () {
                    a.classList.add('show');
                }, 800 + index * 70);
            });
        }
        
        
        // 动画序列
        function startAnimationSequence() {
            // 获取相关元素
            const initialLayout = document.getElementById('initial-layout');
            const mainContent = document.getElementById('main-content');
            const avatarTransition = document.getElementById('avatar-transition');
            const initialAvatar = document.querySelector('.initial-avatar');
            const finalAvatar = document.querySelector('#main-content .avatar');
            
            // 获取初始头像位置和大小
            const initialAvatarRect = initialAvatar.getBoundingClientRect();
            const finalAvatarRect = finalAvatar.getBoundingClientRect();
            
            // 设置过渡头像的初始位置和大小
            avatarTransition.style.width = initialAvatarRect.width + 'px';
            avatarTransition.style.height = initialAvatarRect.height + 'px';
            avatarTransition.style.left = initialAvatarRect.left + 'px';
            avatarTransition.style.top = initialAvatarRect.top + 'px';
            avatarTransition.classList.remove('hidden');
            
            // 1. 初始布局淡出
            setTimeout(() => {
                initialLayout.classList.add('minimized');
                
                // 2. 头像动画过渡到最终位置
                setTimeout(() => {
                    avatarTransition.style.width = '160px';
                    avatarTransition.style.height = '160px';
                    avatarTransition.style.left = finalAvatarRect.left + 'px';
                    avatarTransition.style.top = finalAvatarRect.top + 'px';
                    
                    // 3. 显示主内容区域
                    setTimeout(() => {
                        mainContent.classList.add('show');
                        
                        // 4. 隐藏过渡头像并显示最终头像
                        setTimeout(() => {
                            avatarTransition.classList.add('hidden');
                            
                            // 5. 先显示社交图标
                            setTimeout(() => {
                                const socialIcons = document.querySelectorAll('.social-icon');
                                socialIcons.forEach((icon, index) => {
                                    setTimeout(() => {
                                        icon.classList.add('show');
                                    }, index * 200);
                                });

                                // 6. 正文文字链接 → 引言
                                const cardsReveal = Math.max(420, socialIcons.length * 200 + 200);
                                setTimeout(function () {
                                    renderCards();
                                }, cardsReveal);

                                const quoteDelay = Math.max(620, socialIcons.length * 200 + 520);
                                setTimeout(() => {
                                    updateQuote(false);
                                    document.getElementById('quote-container').classList.add('show');
                                }, quoteDelay);
                            }, 500);
                        }, 800);
                    }, 800);
                }, 800);
            }, 1500);
        }
        
        document.addEventListener('DOMContentLoaded', async function () {
            siteLocale = await resolveSiteLocale();
            await loadSiteConfig();
            quoteDisplayIndex = 0;
            renderSocialIcons();

            document.querySelectorAll('.avatar-img').forEach(function (avatar) {
                function reveal() {
                    avatar.classList.add('loaded');
                }

                if (avatar.closest('#initial-layout')) {
                    reveal();
                    return;
                }

                if (avatar.complete && avatar.naturalWidth > 0) {
                    reveal();
                    return;
                }

                avatar.addEventListener('load', reveal, { once: true });
                avatar.addEventListener('error', reveal, { once: true });
            });

            startAnimationSequence();

            const quoteContainer = document.getElementById('quote-container');
            quoteContainer.addEventListener('click', function () {
                updateQuote(true);
                scheduleQuoteAutoRotate();
            });
            quoteContainer.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    updateQuote(true);
                    scheduleQuoteAutoRotate();
                }
            });
            scheduleQuoteAutoRotate();
        });

        /** 触控 / 窄屏：社交里的微信、QQ用自定义协议唤起 App */
        function shouldUseMobileContactScheme() {
            if (window.matchMedia('(pointer: coarse)').matches) return true;
            if (
                window.matchMedia('(max-width: 767.98px)').matches &&
                ((navigator.maxTouchPoints && navigator.maxTouchPoints > 0) || 'ontouchstart' in window)
            ) {
                return true;
            }
            return false;
        }

        function renderSocialIcons() {
            const container = document.getElementById('social-icons');
            container.innerHTML = '';
            siteSocialLinks.forEach(function (link) {
                const a = document.createElement('a');
                const cssExtra = link.cssClass ? link.cssClass : '';
                a.className = 'social-icon' + (cssExtra ? ' ' + cssExtra : '');
                a.setAttribute('aria-label', link.label);

                var useMobileScheme = shouldUseMobileContactScheme();

                if (link.iconKind === 'wechat' && link.wechatId) {
                    if (useMobileScheme) {
                        a.href = 'weixin://dl/business/?t=' + encodeURIComponent(link.wechatId);
                        a.title =
                            siteLocale === 'zh'
                                ? '在微信中打开添加：' + link.wechatId
                                : 'Open in WeChat to add: ' + link.wechatId;
                    } else {
                        a.href = '#';
                        a.title =
                            siteLocale === 'zh' ? '微信号：' + link.wechatId : 'WeChat ID: ' + link.wechatId;
                        a.addEventListener('click', function (e) {
                            e.preventDefault();
                            copyTextToClipboard(link.wechatId)
                                .then(function () {
                                    showMailToast(siteLocale === 'zh' ? '微信号已复制。' : 'WeChat ID copied.');
                                })
                                .catch(function () {
                                    showMailToast(
                                        siteLocale === 'zh'
                                            ? '请手动复制微信号：' + link.wechatId
                                            : 'Copy manually: ' + link.wechatId
                                    );
                                });
                        });
                    }
                } else if (link.iconKind === 'qq' && link.qqUin) {
                    var uin = link.qqUin;
                    if (useMobileScheme) {
                        a.href =
                            'mqqwpa://im/chat?chat_type=wpa&uin=' +
                            uin +
                            '&version=1&src_type=web&web_src=abcreatoris.com';
                        a.title = 'QQ ' + uin;
                    } else {
                        a.href = 'https://wpa.qq.com/msgrd?v=3&uin=' + uin + '&site=qq&menu=yes';
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.title = 'QQ ' + uin;
                    }
                } else {
                    a.href = link.href;
                    if (/^https?:\/\//i.test(link.href)) {
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                    }
                    if (/^mailto:/i.test(link.href)) {
                        a.title = link.href.replace(/^mailto:/i, '').split('?')[0];
                        bindMailtoClick(a, link.href);
                    }
                }

                if (link.iconKind === 'xiaohongshu') {
                    a.innerHTML = SOCIAL_SVG_XHS;
                } else {
                    const i = document.createElement('i');
                    i.className = link.iconClass;
                    i.setAttribute('aria-hidden', 'true');
                    a.appendChild(i);
                }
                container.appendChild(a);
            });
        }
    </script>
