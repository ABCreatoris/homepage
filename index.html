<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
    <!-- 内联 favicon，避免在 / 目录列表、子路径部署时相对路径解析错误导致 404 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230066cc'/%3E%3C/svg%3E">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAEAICAAAAEAIABhAAAAFgAAAIlQTkcNChoKAAAADUlIRFIAAAAgAAAAIAgCAAAA/BjtowAAAChJREFUeNrtzTENAAAIA7CpRS2ipoKDpEn/JrO3BAKBQCAQCAQCwZegDtXIPTrZwzMAAAAASUVORK5CYII=">
    <link rel="stylesheet" href="tailwind.css">
    <!-- Font Awesome 用 bootcdn -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 中文问候：霞鹜文楷；英文：Instrument Serif（标题/引言）+ Source Sans 3（正文/UI） -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-webfont/1.7.0/lxgwwenkai-regular.css">
    <link
        rel="stylesheet"
        href="https://fonts.bunny.net/css?family=instrument-serif:400,500|source-sans-3:400,500,600&display=swap"
    />
    <style>
        :root {
            --page-bg: #f2f2f6;
        }

        html[lang^='en'] {
            --en-serif-tracking: 0.034em;
            --en-serif-tracking-flair: 0.052em;
            --en-serif-line: 1.58;
            --en-serif-side: 1.15rem;
        }

        .social-icon {
            transition: opacity 0.3s ease, transform 0.35s ease;
            opacity: 0;
            transform: translateY(8px);
        }
        
        .social-icon.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .social-icon:hover {
            opacity: 0.65;
        }

        /* 社交图标：单行；字号用固定阶梯，不用多级 clamp */
        #social-icons {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            box-sizing: border-box;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        #social-icons::-webkit-scrollbar {
            display: none;
        }

        #social-icons .social-icon {
            flex-shrink: 0;
            margin: 0;
            font-size: 1.5rem;
            line-height: 1;
        }

        @media (max-width: 640px) {
            #social-icons {
                gap: 0.45rem;
                padding-left: 0.35rem;
                padding-right: 0.35rem;
            }

            #social-icons .social-icon {
                font-size: 1.625rem;
            }

            /* 窄屏链接：居中、大留白、短分割线 — 偏「版式」而非工具列表 */
            .content-links {
                flex-direction: column;
                flex-wrap: nowrap;
                align-items: center;
                justify-content: flex-start;
                max-width: min(23rem, 94vw);
                gap: 0;
                margin-top: 0.75rem;
                margin-left: auto;
                margin-right: auto;
                padding: 0.25rem 0.75rem 0.5rem;
                font-size: 1rem;
                line-height: 1.55;
                background: none;
                border: none;
                border-radius: 0;
                box-shadow: none;
            }

            .content-links__sep {
                display: none;
            }

            .content-links__a {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0;
                width: 100%;
                max-width: 20rem;
                text-align: center;
                text-decoration: none;
                padding: 1.2rem 1rem 1.35rem;
                min-height: 0;
                border-radius: 0;
                background: transparent;
                border: none;
                font-weight: 500;
                color: #1d1d1f;
                box-shadow: none;
                position: relative;
                transition: color 0.2s ease, opacity 0.2s ease;
                -webkit-tap-highlight-color: transparent;
            }

            .content-links__a ~ .content-links__a::before {
                content: '';
                display: block;
                width: min(3.25rem, 28vw);
                height: 1px;
                margin: 0 auto 0.15rem;
                background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.12), transparent);
            }

            .content-links__a:hover {
                text-decoration: none;
                color: #0066cc;
                background: transparent;
            }

            .content-links__a:focus-visible {
                text-decoration: none;
                color: #0066cc;
                background: rgba(0, 0, 0, 0.025);
                outline: 2px solid rgba(0, 102, 204, 0.3);
                outline-offset: 4px;
                border-radius: 4px;
            }

            .content-links__a:hover .content-links__title,
            .content-links__a:focus-visible .content-links__title {
                color: #0066cc;
            }

            .content-links__a:hover .content-links__desc,
            .content-links__a:focus-visible .content-links__desc {
                color: #6e6e73;
            }

            .content-links__a:active {
                opacity: 0.92;
            }

            .content-links__title {
                display: block;
                font-size: 1.0625rem;
                font-weight: 500;
                letter-spacing: 0.04em;
                line-height: 1.45;
                color: inherit;
            }

            .content-links__desc {
                display: block;
                margin-top: 0.45rem;
                font-size: 0.8125rem;
                font-weight: 400;
                letter-spacing: 0.02em;
                color: #8e8e93;
                line-height: 1.55;
                max-width: 19rem;
            }

            .content-links__desc:empty {
                display: none;
            }

            .page-shell {
                padding-left: 1rem;
                padding-right: 1rem;
                width: 100%;
                max-width: 100%;
                overflow-x: hidden;
            }

            .initial-avatar {
                width: 150px;
                height: 150px;
            }

            .initial-name {
                font-size: 1.875rem;
            }

            .initial-title {
                font-size: 1.0625rem;
            }
        }

        @media (min-width: 640px) {
            #social-icons {
                gap: 1.25rem;
                overflow-x: visible;
            }

            #social-icons .social-icon {
                font-size: 1.75rem;
            }
        }

        @media (min-width: 768px) {
            #social-icons {
                gap: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            #social-icons .social-icon {
                font-size: 2rem;
            }
        }
        
        .card {
            transition: opacity 0.35s ease, transform 0.35s ease;
            opacity: 0;
            transform: translateY(12px);
        }
        
        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 正文链接 */
        .content-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.35rem 0.2rem;
            width: 100%;
            max-width: 36rem;
            margin: 0.35rem auto 0;
            padding: 0.25rem 0;
            font-size: 1rem;
            line-height: 1.6;
        }

        .content-links__sep {
            color: #c7c7cc;
            user-select: none;
            padding: 0 0.15rem;
        }

        .content-links__title {
            display: inline;
        }

        .content-links__desc {
            display: none;
        }

        .content-links__a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
            padding: 0.2rem 0.15rem;
            border-radius: 4px;
            transition: color 0.15s ease, text-decoration-color 0.15s ease;
        }

        @media (min-width: 641px) {
            .content-links__a:hover {
                color: #004499;
                text-decoration: underline;
                text-underline-offset: 0.2em;
            }
        }

        .content-links__a:focus {
            outline: none;
        }

        @media (min-width: 641px) {
            .content-links__a:focus-visible {
                outline: 2px solid rgba(0, 102, 204, 0.45);
                outline-offset: 2px;
            }
        }

        .content-links .card {
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .content-links .card.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 主栏：略收窄，段落更易读 */
        .page-shell {
            max-width: 52rem;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
        
        @media (min-width: 640px) {
            .page-shell {
                padding-left: 2rem;
                padding-right: 2rem;
            }
        }
        
        /* 区块之间只用间距拉节奏，避免多条横线切碎版面 */
        .layout-stack {
            display: flex;
            flex-direction: column;
            gap: 3.25rem;
        }
        
        @media (min-width: 768px) {
            .layout-stack {
                gap: 4.5rem;
            }
        }

        /* 主栏一屏收尾：压缩纵向节奏；引言区不再吸底 */
        #main-content.layout-stack {
            min-height: 100vh;
            min-height: 100dvh;
            box-sizing: border-box;
            gap: clamp(1rem, 3vh, 2.25rem);
        }

        @media (min-width: 768px) {
            #main-content.layout-stack {
                gap: clamp(1.25rem, 3.5vh, 2.75rem);
            }
        }

        #quote-section {
            width: 100%;
            max-width: 34rem;
            margin-left: auto;
            margin-right: auto;
            padding-top: 0.35rem;
            padding-bottom: max(1rem, env(safe-area-inset-bottom, 0px));
        }

        @media (max-height: 720px) {
            #main-content.layout-stack {
                gap: 0.75rem;
            }

            .font-quote {
                font-size: clamp(1.0625rem, 2.1vw + 0.45rem, 1.3125rem);
            }

            .quote-attribution {
                margin-top: 0.65rem;
            }
        }

        /* 窄屏手机（如 iPhone 12）：主内容压入一屏，避免纵向滚动条；仅作用于已展示的主页 */
        @media (max-width: 767.98px) {
            body:has(#main-content.show) {
                height: 100dvh;
                max-height: 100dvh;
                overflow: hidden;
            }

            #main-content.layout-stack.show {
                height: 100dvh;
                max-height: 100dvh;
                min-height: 0 !important;
                overflow: hidden;
                box-sizing: border-box;
                gap: clamp(0.35rem, 1vh, 0.65rem);
                padding-top: calc(0.35rem + env(safe-area-inset-top, 0px)) !important;
                padding-bottom: calc(0.2rem + env(safe-area-inset-bottom, 0px)) !important;
            }

            #main-content.show .header-hero__cluster {
                margin-bottom: 0.35rem;
            }

            #main-content.show .header-avatar-slot {
                width: 7.25rem;
                height: 7.25rem;
            }

            #main-content.show .header-flair {
                min-height: 4.75rem;
            }

            #main-content.show .hero-title {
                font-size: clamp(1.75rem, 8vw, 2.125rem);
                margin-bottom: 0.25rem;
            }

            #main-content.show #tagline-main {
                font-size: 0.9375rem;
                line-height: 1.35;
            }

            #main-content.show #social-icons {
                margin-top: 0;
            }

            #main-content.show .content-links {
                margin-top: 0.1rem;
                padding: 0;
            }

            #main-content.show .content-links__a {
                padding: 0.62rem 0.75rem 0.68rem;
            }

            #main-content.show .content-links__desc {
                margin-top: 0.3rem;
            }

            #main-content.show #quote-section {
                padding-top: 0.12rem;
                padding-bottom: calc(0.3rem + env(safe-area-inset-bottom, 0px));
            }

            #main-content.show .quote-container {
                padding: 0.15rem 0.35rem 0.2rem;
            }

            #main-content.show .font-quote {
                font-size: clamp(1rem, 2.8vw, 1.125rem);
                line-height: 1.42;
            }

            #main-content.show .quote-attribution {
                margin-top: 0.38rem;
            }
        }
        
        .hero-title {
            font-size: clamp(2.125rem, 5.5vw, 3.25rem);
            line-height: 1.06;
            letter-spacing: -0.038em;
            overflow: visible;
        }
        
        .section-eyebrow {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #86868b;
            text-align: center;
            margin: 0 0 1.125rem;
        }
        
        .section-label {
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #86868b;
            text-align: center;
            margin: 0 0 1.75rem;
        }
        
        .quote-container {
            position: relative;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.75s cubic-bezier(0.25, 0.1, 0.25, 1),
                transform 0.75s cubic-bezier(0.25, 0.1, 0.25, 1);
            margin-left: auto;
            margin-right: auto;
            padding: 0.35rem 0.5rem 0.5rem;
            text-align: center;
            perspective: 560px;
            -webkit-tap-highlight-color: transparent;
        }

        .quote-container:focus {
            outline: none;
        }

        .quote-container:focus-visible {
            outline: 2px solid rgba(99, 102, 241, 0.4);
            outline-offset: 4px;
            border-radius: 10px;
        }

        .quote-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 成对引号：挂在正文块左上角 / 右下角，不占单独一行 */
        #quote.font-quote {
            position: relative;
            padding-left: 0.65em;
            padding-right: 0.65em;
        }

        #quote.font-quote::before,
        #quote.font-quote::after {
            position: absolute;
            font-family: 'Times New Roman', 'Songti SC', 'STSong', Georgia, 'Palatino Linotype', serif;
            font-size: 1.42em;
            line-height: 1;
            font-weight: 400;
            color: rgba(99, 102, 241, 0.28);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.55s ease 0.1s;
        }

        .quote-container.show #quote.font-quote::before,
        .quote-container.show #quote.font-quote::after {
            opacity: 1;
        }

        #quote.font-quote::before {
            content: '\201C';
            left: 0;
            top: 0.02em;
        }

        #quote.font-quote::after {
            content: '\201D';
            right: 0;
            bottom: 0.08em;
        }

        #quote.font-quote .quote-glyph {
            position: relative;
            z-index: 1;
        }

        /* 逐词/逐字：略轻的模糊与倾角，适配小字号 */
        .quote-glyph {
            display: inline-block;
            opacity: 0;
            transform-origin: 50% 100%;
            filter: blur(7px);
            transform: translateY(0.28em) rotateX(-34deg);
        }

        .quote-container.quote-play .quote-glyph {
            animation: quoteGlyphReveal 0.52s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: calc(var(--qi, 0) * 36ms);
        }

        @keyframes quoteGlyphReveal {
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0) rotateX(0deg);
            }
        }

        #quote-author {
            opacity: 0;
            transform: translateY(6px);
            filter: blur(6px);
        }

        .quote-container.quote-play #quote-author {
            animation: quoteAuthorReveal 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: var(--quote-author-delay, 0.45s);
        }

        @keyframes quoteAuthorReveal {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .quote-container.show #quote.font-quote::before,
            .quote-container.show #quote.font-quote::after {
                opacity: 1;
                transition: none;
            }

            .quote-container.quote-play .quote-glyph {
                animation: none;
                opacity: 1;
                filter: none;
                transform: none;
            }

            #quote-author {
                opacity: 1;
                filter: none;
                transform: none;
            }

            .quote-container.quote-play #quote-author {
                animation: none;
            }
        }
        
        /* 开场头像保留装饰环；正文区内头像改为干净阴影 */
        .initial-layout .avatar,
        .avatar-transition {
            box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.8), 0 0 0 10px rgba(156, 163, 175, 0.2);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }
        
        .initial-layout .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.9), 0 0 0 16px rgba(156, 163, 175, 0.3);
        }
        
        #main-content .avatar,
        #header-avatar-wrap {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }
        
        #main-content .header-avatar-slot:hover #header-avatar-wrap {
            transform: scale(1.03);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.1);
        }

        .header-avatar-slot {
            overflow: visible;
            --avatar-r: 5rem;
            --avatar-badge-hit: 2.55rem;
            --badge-r: calc(var(--avatar-badge-hit) / 2);
            /* 右下角 45°：角标圆心落在头像圆周上 */
            --badge-anchor-x: calc(50% + var(--avatar-r) * 0.70710678 - var(--badge-r));
            --badge-anchor-y: calc(50% + var(--avatar-r) * 0.70710678 - var(--badge-r));
        }

        @media (max-width: 640px) {
            .header-avatar-slot {
                --avatar-badge-hit: 2.35rem;
            }
        }

        /* 渐进头像：小图铺色 → 大图单层渐清（transition，避免关键帧/类切换闪烁） */
        .avatar-photo-stack {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 0;
            background: radial-gradient(circle at 50% 42%, #ececf1 0%, #e2e3ea 100%);
            overflow: hidden;
            isolation: isolate;
        }

        .avatar-photo-stack .avatar-photo-thumb,
        .avatar-photo-stack .avatar-photo-full {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .avatar-photo-stack .avatar-photo-thumb {
            filter: blur(28px) saturate(1.05);
            opacity: 0;
            z-index: 0;
            transition: opacity 0.45s ease;
            pointer-events: none;
        }

        .avatar-photo-stack.thumb-ready .avatar-photo-thumb {
            opacity: 1;
        }

        .avatar-photo-stack.thumb-hidden .avatar-photo-thumb {
            opacity: 0;
            transition: none;
        }

        .avatar-photo-stack.is-sharp .avatar-photo-thumb {
            opacity: 0;
        }

        .avatar-photo-stack .avatar-photo-full {
            opacity: 0;
            filter: blur(20px);
            z-index: 1;
            transition: filter 1.55s cubic-bezier(0.25, 1, 0.35, 1);
        }

        .avatar-photo-stack.full-loaded .avatar-photo-full {
            opacity: 1;
            transition:
                opacity 0.35s ease,
                filter 1.55s cubic-bezier(0.25, 1, 0.35, 1);
        }

        .avatar-photo-stack.is-sharp .avatar-photo-full {
            opacity: 1;
            filter: blur(0);
        }

        #header-avatar-wrap {
            -webkit-tap-highlight-color: transparent;
        }

        #header-avatar-wrap.avatar-wrap--ready {
            cursor: pointer;
        }

        #header-avatar-wrap.avatar-wrap--ready:focus-visible {
            outline: 2px solid rgba(0, 102, 204, 0.45);
            outline-offset: 4px;
            border-radius: 9999px;
        }

        .avatar-presence-badge {
            position: absolute;
            z-index: 5;
            pointer-events: auto;
            line-height: 1;
            opacity: 0;
        }

        .header-avatar-slot.avatar-wiggle-pre-badge {
            animation: avatarPreBadgeWiggle 0.58s cubic-bezier(0.36, 0.07, 0.2, 1);
            transform-origin: center center;
        }

        @keyframes avatarPreBadgeWiggle {
            0%,
            100% {
                transform: rotate(0deg);
            }
            18% {
                transform: rotate(-5deg);
            }
            36% {
                transform: rotate(4.5deg);
            }
            54% {
                transform: rotate(-3deg);
            }
            72% {
                transform: rotate(2deg);
            }
            88% {
                transform: rotate(-0.8deg);
            }
        }

        .avatar-presence-badge.is-revealed {
            animation: presenceBadgeReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes presenceBadgeReveal {
            from {
                opacity: 0;
                transform: scale(0.75);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .avatar-presence-badge--work.is-revealed,
        .avatar-presence-badge--weekend.is-revealed,
        .avatar-presence-badge--holiday.is-revealed {
            transform-origin: 100% 100%;
        }

        /* 节假日角标：圆心落在头像圆边（右下约 45°） */
        .avatar-presence-badge--holiday {
            left: calc(50% + var(--avatar-r) * 0.70710678 - 1rem);
            top: calc(50% + var(--avatar-r) * 0.70710678 - 1rem);
            right: auto;
            bottom: auto;
            width: var(--avatar-badge-hit, 2.55rem);
            height: var(--avatar-badge-hit, 2.55rem);
        }

        /* 在职 / 周末角标：圆心在头像圆周 */
        .avatar-presence-badge--work,
        .avatar-presence-badge--weekend {
            left: var(--badge-anchor-x);
            top: var(--badge-anchor-y);
            right: auto;
            bottom: auto;
            width: var(--avatar-badge-hit, 2.55rem);
            height: var(--avatar-badge-hit, 2.55rem);
        }

        .avatar-presence-badge--hinted {
            display: block;
            padding: 0;
            margin: 0;

        .header-flair {
            position: relative;
            min-height: 10rem;
            display: flex;
            align-items: center;
            pointer-events: none;
            overflow: visible;
        }

        .header-flair--left {
            justify-content: flex-end;
        }

        .header-flair--right {
            justify-content: flex-start;
        }

        .header-flair-line {
            --flair-shift: 0rem;
            margin: 0;
            max-width: none;
            white-space: nowrap;
            font-family: 'LXGW WenKai', 'Kaiti SC', 'STKaiti', KaiTi, serif;
            font-size: clamp(0.9375rem, 2.5vw, 1.125rem);
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 0.06em;
            color: #1d1d1f;
            transform: translateY(var(--flair-shift));
            will-change: filter, opacity, transform;
        }

        html[lang^='en'] .header-flair-line {
            font-family: 'Instrument Serif', 'Palatino Linotype', Georgia, serif;
            font-weight: 400;
            font-size: clamp(0.975rem, 2.5vw, 1.1875rem);
            letter-spacing: var(--en-serif-tracking-flair);
            line-height: 1.48;
            word-spacing: 0.06em;
            padding-left: 0.28em;
            padding-right: 0.28em;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .header-flair--left .header-flair-line {
            text-align: right;
        }

        .header-flair--right .header-flair-line {
            text-align: left;
        }

        /* 问候语：整句 SVG 湍流 + 逐字上下跳动归位 */
        .header-flair-line.is-distorting {
            filter: url(#header-flair-distort-filter);
            opacity: 0.55;
            transform: translateY(var(--flair-shift)) scale(1.03);
        }

        .header-flair-char {
            --twist-r: 0deg;
            --lift: 0.4em;
            display: inline-block;
            opacity: 0;
            transform: translateY(var(--lift)) rotate(var(--twist-r));
            transform-origin: 50% 100%;
        }

        .header-flair-line.is-live .header-flair-char {
            animation: headerFlairCharSettle 0.78s cubic-bezier(0.34, 1.22, 0.48, 1) forwards;
            animation-delay: calc(var(--fi, 0) * 42ms);
        }

        @keyframes headerFlairCharSettle {
            0% {
                opacity: 0;
                transform: translateY(var(--lift)) rotate(var(--twist-r));
            }
            36% {
                opacity: 0.92;
                transform: translateY(calc(var(--lift) * -0.55)) rotate(calc(var(--twist-r) * 0.35));
            }
            62% {
                opacity: 1;
                transform: translateY(0.07em) rotate(calc(var(--twist-r) * 0.1));
            }
            82% {
                transform: translateY(-0.05em) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
        }

        .header-flair-line.is-sharp {
            filter: none;
            opacity: 1;
            transform: translateY(var(--flair-shift)) scale(1);
        }

        .header-flair-line.is-out {
            opacity: 0;
            filter: none;
            transform: translateY(var(--flair-shift)) scale(0.98);
            transition: opacity 0.42s ease, transform 0.42s ease;
        }

        /* 手机 / 小屏：仅淡入淡出，不用湍流与逐字跳动 */
        .header-flair-line--simple {
            filter: none !important;
            opacity: 0;
            transition: opacity 0.32s ease;
        }

        .header-flair-line--simple.is-visible {
            opacity: 1;
        }

        .header-flair-line--simple.is-out {
            opacity: 0;
        }

        .header-flair-svg-defs {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
            pointer-events: none;
        }

        @media (max-width: 767.98px) {
            .header-flair {
                min-height: 6.5rem;

            .header-flair-line {
                font-size: 0.875rem;

    <script>
        /** 境内 CN → 中文；境外 → 英文。失败时按浏览器语言回退。 */
        let siteLocale = 'zh';

        /** 格言列表（由 config.{zh|en}.json 的 quotes 填充） */
        let quotesFromConfig = [];

        /** 当前展示的格言在列表中的下标 */
        let quoteDisplayIndex = 0;

        /** 自动切换下一条格言的间隔（5.20 秒） */
        const QUOTE_AUTO_ROTATE_MS = 5200;

        /** 自动轮播计时器；手动点击后会 clear 再 schedule，重新从完整间隔计起 */
        let quoteAutoRotateTimerId = null;

        function scheduleQuoteAutoRotate() {
            clearTimeout(quoteAutoRotateTimerId);
            quoteAutoRotateTimerId = setTimeout(function () {
                updateQuote(true);
                scheduleQuoteAutoRotate();
            }, QUOTE_AUTO_ROTATE_MS);
        }

        /** 当前语言 ui 文案（来自 config.*.json，供 toast / title 等使用） */
        let siteUi = {};
        let siteAnalytics = null;
        var LIKE_STORAGE_KEY = 'homepage-liked-v1';
        var LIKE_TOTAL_LS_KEY = 'homepage-like-total-v1';
        var LIKE_VISITOR_LS_KEY = 'homepage-visitor-id-v1';
        var ABACUS_API_BASE = 'https://abacus.jasoncameron.dev';

        function uiMessage(key, replacements) {
            var template = siteUi && typeof siteUi[key] === 'string' ? siteUi[key] : '';
            if (!replacements) return template;
            return Object.keys(replacements).reduce(function (acc, k) {
                return acc.split('{' + k + '}').join(replacements[k]);
            }, template);
        }

        /** 配置文件加载失败时的空壳（不含个人文案，仅保证结构） */
        function createEmptySiteConfig(loc) {
            return {
                ui: {
                    htmlLang: loc === 'zh' ? 'zh-CN' : 'en',
                    pageTitle: '',
                    nameDisplay: '',
                    tagline: '',
                    avatarAlt: '',
                    socialNavAria: '',
                    linksSectionAria: '',
                    contentLinksNavAria: '',
                    quoteSectionAria: '',
                    quoteToggleAria: '',
                    quoteToggleTitle: '',
                    headerAvatarAria: '',
                    mailCopySuccess: '',
                    mailCopyManual: '',
                    wechatCopySuccess: '',
                    wechatCopyManual: '',
                    wechatTitleDesktop: '',
                    wechatTitleMobile: '',
                    qqTitle: ''
                },
                avatarMedia: { fullUrl: '', thumbUrl: '', thumbSize: 32, fallbackUrl: '' },
                avatarTap: { bubbles: [] },
                presence: null,
                social: [],
                contentLinks: [],
                quotes: { mottos: [], famous: [] },
                analytics: { likes: { enabled: false } }
            };
        }

        function getOrCreateVisitorId() {
            try {
                var id = localStorage.getItem(LIKE_VISITOR_LS_KEY);
                if (id) return id;
                id =
                    'v-' +
                    Date.now().toString(36) +
                    '-' +
                    Math.random().toString(36).slice(2, 10);
                localStorage.setItem(LIKE_VISITOR_LS_KEY, id);
                return id;
            } catch (e) {
                return 'v-anon';
            }
        }

        function readLocalLikeTotal(storageKey) {
            try {
                var raw = localStorage.getItem(storageKey || LIKE_TOTAL_LS_KEY);
                var n = parseInt(raw, 10);
                return isNaN(n) || n < 0 ? 0 : n;
            } catch (e) {
                return 0;
            }
        }

        function writeLocalLikeTotal(count, storageKey) {
            try {
                localStorage.setItem(storageKey || LIKE_TOTAL_LS_KEY, String(Math.max(0, count)));
            } catch (e) {}
        }

        function abacusGet(namespace, key) {
            var url =
                ABACUS_API_BASE +
                '/get/' +
                encodeURIComponent(namespace) +
                '/' +
                encodeURIComponent(key);
            return fetch(url, { cache: 'no-store' })
                .then(function (res) {
                    if (!res.ok) return null;
                    return res.json();
                })
                .then(function (data) {
                    return data && typeof data.value === 'number' ? data.value : null;
                })
                .catch(function () {
                    return null;
                });
        }

        function abacusHit(namespace, key) {
            var url =
                ABACUS_API_BASE +
                '/hit/' +
                encodeURIComponent(namespace) +
                '/' +
                encodeURIComponent(key);
            return fetch(url, { cache: 'no-store' })
                .then(function (res) {
                    if (!res.ok) return null;
                    return res.json();
                })
                .then(function (data) {
                    return data && typeof data.value === 'number' ? data.value : null;
                })
                .catch(function () {
                    return null;
                });
        }

        function resolveLikeProvider(likesCfg) {
            var p = likesCfg && typeof likesCfg.provider === 'string' ? likesCfg.provider.toLowerCase() : '';
            if (p === 'local') return 'local';
            if (p === 'abacus' || p === 'remote') return 'abacus';
            if (p === 'countapi') return 'abacus';
            return 'abacus';
        }

        function fetchLikeTotal(likesCfg) {
            var provider = resolveLikeProvider(likesCfg);
            var localKey =
                likesCfg && typeof likesCfg.localTotalKey === 'string'
                    ? likesCfg.localTotalKey
                    : LIKE_TOTAL_LS_KEY;
            if (provider === 'local') {
                return Promise.resolve(readLocalLikeTotal(localKey));
            }
            var ns =
                (likesCfg && likesCfg.abacusNamespace) ||
                (likesCfg && likesCfg.countApiNamespace) ||
                'abcreatoris.com';
            var totalKey = (likesCfg && likesCfg.totalLikesKey) || 'total-likes';
            return abacusGet(ns, totalKey).then(function (val) {
                if (typeof val === 'number' && val >= 0) return val;
                return readLocalLikeTotal(localKey);
            });
        }

        function incrementLikeTotal(likesCfg) {
            var provider = resolveLikeProvider(likesCfg);
            var localKey =
                likesCfg && typeof likesCfg.localTotalKey === 'string'
                    ? likesCfg.localTotalKey
                    : LIKE_TOTAL_LS_KEY;
            if (provider === 'local') {
                var next = readLocalLikeTotal(localKey) + 1;
                writeLocalLikeTotal(next, localKey);
                return Promise.resolve(next);
            }
            var ns =
                (likesCfg && likesCfg.abacusNamespace) ||
                (likesCfg && likesCfg.countApiNamespace) ||
                'abcreatoris.com';
            var totalKey = (likesCfg && likesCfg.totalLikesKey) || 'total-likes';
            return abacusHit(ns, totalKey).then(function (val) {
                if (typeof val === 'number' && val >= 0) {
                    writeLocalLikeTotal(val, localKey);
                    return val;
                }
                var fallback = readLocalLikeTotal(localKey) + 1;
                writeLocalLikeTotal(fallback, localKey);
                return fallback;
            });
        }

        function formatLikeHoverHint(ui, count, liked) {
            var n = typeof count === 'number' && count >= 0 ? count : 0;
            if (liked && n < 1) n = 1;
            if (n < 1) {
                return ui && ui.likeHoverHintEmpty ? ui.likeHoverHintEmpty : '期待你的点赞';
            }
            var tpl = ui && ui.likeHoverHint ? ui.likeHoverHint : '已有{count}位访客点赞';
            return tpl.split('{count}').join(String(n));
        }

        function setHeroLikeUi(btn, countEl, liked, count, ui) {
            if (!btn) return;
            var n = typeof count === 'number' && count >= 0 ? count : 0;
            if (liked && n < 1) n = 1;

            btn.classList.toggle('is-liked', liked);
            btn.setAttribute('aria-pressed', liked ? 'true' : 'false');

            var hintText = formatLikeHoverHint(ui, count, liked);
            btn.setAttribute('title', hintText);

            var ariaCount = liked && n > 0 ? String(n) : '';
            btn.setAttribute(
                'aria-label',
                liked
                    ? (ui && ui.likeAriaLabelActive ? ui.likeAriaLabelActive : '已点赞') +
                      (ariaCount ? '，' + hintText : '')
                    : ui && ui.likeAriaLabel
                      ? ui.likeAriaLabel
                      : '点赞'
            );

            if (countEl) {
                if (liked && n > 0) {
                    countEl.textContent = String(n);
                    countEl.removeAttribute('aria-hidden');
                } else {
                    countEl.textContent = '';
                    countEl.setAttribute('aria-hidden', 'true');
                }
            }
        }

        function initHeroLike(likesCfg, ui) {
            if (!likesCfg || !likesCfg.enabled) return;

            var btn = document.getElementById('hero-like-btn');
            var countEl = document.getElementById('hero-like-count');
            if (!btn) return;

            var currentLikeCount = 0;
            var visitorId = getOrCreateVisitorId();
            var likedKey = LIKE_STORAGE_KEY + '-' + visitorId;
            var liked = false;
            var ready = false;

            btn.removeAttribute('hidden');
            btn.disabled = true;
            setHeroLikeUi(btn, countEl, false, 0, ui);

            function applyLikedState() {
                setHeroLikeUi(btn, countEl, true, currentLikeCount, ui);
                try {
                    localStorage.setItem(LIKE_STORAGE_KEY, '1');
                    localStorage.setItem(likedKey, '1');
                } catch (e) {}
            }

            function refreshTotalCount() {
                return fetchLikeTotal(likesCfg).then(function (val) {
                    if (typeof val === 'number' && val >= 0) {
                        currentLikeCount = val;
                        setHeroLikeUi(btn, countEl, liked, currentLikeCount, ui);
                    }
                });
            }

            try {
                if (localStorage.getItem(LIKE_STORAGE_KEY) === '1' || localStorage.getItem(likedKey) === '1') {
                    liked = true;
                    applyLikedState();
                }
            } catch (e) {}

            ready = true;
            refreshTotalCount().finally(function () {
                if (!liked) btn.disabled = false;
            });

            btn.addEventListener('click', function () {
                if (!ready || liked) return;
                liked = true;
                applyLikedState();
                btn.disabled = true;

                incrementLikeTotal(likesCfg).then(function (val) {
                    if (typeof val === 'number') {
                        currentLikeCount = val;
                        setHeroLikeUi(btn, countEl, true, currentLikeCount, ui);
                    }
                });
            });
        }

        function initSiteAnalytics(data) {
            var analytics = data && data.analytics;
            siteAnalytics = analytics;
            if (!analytics) return;
            initHeroLike(analytics.likes, data.ui);
        }

        /** 社交平台 SVG（小红书不在 Font Awesome brands 中时改用） */
        const SOCIAL_SVG_XHS =
            '<svg class="xhs-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="5.5" fill="currentColor"/><path fill="#ffffff" d="M7 7h10v2H7zm0 4h7v2H7zm0 4h10v2H7z"/></svg>';

        let siteSocialLinks = [];
        let siteContentLinks = [];
        let siteAvatarMedia = null;
        let siteAvatarTap = { bubbles: [] };
        let sitePresence = null;

        const DEFAULT_AVATAR_THUMB_SIZE = 32;

        function emptyAvatarMedia() {
            return {
                fullUrl: '',
                thumbSize: DEFAULT_AVATAR_THUMB_SIZE,
                thumbUrl: '',
                fallbackUrl: ''
            };
        }

        /** Gitee 头像缩略图用后缀 !avatar32（非 ?avatar32） */
        function buildGiteeAvatarThumbUrl(fullUrl, size) {
            var px = typeof size === 'number' && size > 0 ? Math.round(size) : DEFAULT_AVATAR_THUMB_SIZE;
            if (typeof fullUrl !== 'string' || !fullUrl.length) return '';
            var base = fullUrl.replace(/!avatar\d+/i, '').split('?')[0];
            if (/foruda\.gitee\.com\/avatar\//i.test(base)) {
                return base + '!avatar' + px;
            }
            return fullUrl;
        }

        function normalizeAvatarMedia(m) {
            var d = emptyAvatarMedia();
            if (!m || typeof m !== 'object') {
                return {
                    fullUrl: d.fullUrl,
                    thumbUrl: d.thumbUrl,
                    thumbSize: d.thumbSize,
                    fallbackUrl: d.fallbackUrl
                };
            }
            var full = typeof m.fullUrl === 'string' && m.fullUrl ? m.fullUrl : d.fullUrl;
            var thumbSize =
                typeof m.thumbSize === 'number' && m.thumbSize > 0 ? Math.round(m.thumbSize) : DEFAULT_AVATAR_THUMB_SIZE;
            var thumb =
                typeof m.thumbUrl === 'string' && m.thumbUrl
                    ? m.thumbUrl
                    : buildGiteeAvatarThumbUrl(full, thumbSize);
            var fb = typeof m.fallbackUrl === 'string' && m.fallbackUrl ? m.fallbackUrl : d.fallbackUrl;
            return { fullUrl: full, thumbUrl: thumb, thumbSize: thumbSize, fallbackUrl: fb };
        }

        function preloadAvatarThumb(url) {
            if (!url || typeof url !== 'string') return;
            var id = 'avatar-thumb-preload';
            var link = document.getElementById(id);
            if (link) {
                if (link.href !== url) link.href = url;
                return;
            }
            link = document.createElement('link');
            link.id = id;
            link.rel = 'preload';
            link.as = 'image';
            link.href = url;
            document.head.appendChild(link);
        }

        function normalizeAvatarTap(t) {
            var bubbles = [];
            if (t && Array.isArray(t.bubbles)) {
                t.bubbles.forEach(function (b) {
                    if (typeof b === 'string' && b.length) {
                        bubbles.push({ text: b });
                        return;
                    }
                    if (b && typeof b.text === 'string' && b.text.length) {
                        bubbles.push({ text: b.text });
                    }
                });
            }
            return { bubbles: bubbles };
        }

        function normalizeStringList(arr, fallback) {
            var out = [];
            if (Array.isArray(arr)) {
                arr.forEach(function (s) {
                    if (typeof s === 'string' && s.length) out.push(s);
                });
            }
            if (!out.length && typeof fallback === 'string' && fallback.length) out.push(fallback);
            return out;
        }

        function normalizeHoliday(h) {
            if (!h || typeof h !== 'object' || typeof h.startMonth !== 'number') return null;
            var sm = h.startMonth;
            var sd = typeof h.startDay === 'number' ? h.startDay : 1;
            var em = typeof h.endMonth === 'number' ? h.endMonth : sm;
            var ed = typeof h.endDay === 'number' ? h.endDay : sd;
            var hoverHint = '';
            if (typeof h.hoverHint === 'string' && h.hoverHint.length) {
                hoverHint = h.hoverHint;
            } else if (typeof h.title === 'string') {
                hoverHint = h.title;
            }
            return {
                id: typeof h.id === 'string' ? h.id : '',
                title: typeof h.title === 'string' ? h.title : '',
                hoverHint: hoverHint,
                hoverHints: normalizeStringList(h.hoverHints, hoverHint),
                icon: typeof h.icon === 'string' ? h.icon : '',
                startMonth: sm,
                startDay: sd,
                endMonth: em,
                endDay: ed
            };
        }

        function normalizePresence(p) {
            if (!p || typeof p !== 'object') return null;
            var wbRaw = p.workBadge && typeof p.workBadge === 'object' ? p.workBadge : {};
            var workFallback = '';
            if (typeof wbRaw.hoverHint === 'string') workFallback = wbRaw.hoverHint;
            else if (typeof wbRaw.employmentTooltip === 'string') workFallback = wbRaw.employmentTooltip;
            else if (typeof wbRaw.hiringTooltip === 'string') workFallback = wbRaw.hiringTooltip;
            var wb = {
                icon: typeof wbRaw.icon === 'string' ? wbRaw.icon : 'briefcase',
                iconClass: typeof wbRaw.iconClass === 'string' ? wbRaw.iconClass : '',
                hoverHints: normalizeStringList(wbRaw.hoverHints, workFallback)
            };
            var weRaw = p.weekendBadge && typeof p.weekendBadge === 'object' ? p.weekendBadge : {};
            var weekendHint = typeof weRaw.hoverHint === 'string' ? weRaw.hoverHint : '';
            var weekendBadge = {
                enabled: weRaw.enabled !== false,
                icon: typeof weRaw.icon === 'string' ? weRaw.icon : 'home',
                hoverHints: normalizeStringList(weRaw.hoverHints, weekendHint)
            };
            var holidays = [];
            if (Array.isArray(p.holidays)) {
                p.holidays.forEach(function (h) {
                    var norm = normalizeHoliday(h);
                    if (norm) holidays.push(norm);
                });
            }
            return {
                employmentType: typeof p.employmentType === 'string' ? p.employmentType : '',
                companyLegalName: typeof p.companyLegalName === 'string' ? p.companyLegalName : '',
                companyMatchSubstring: typeof p.companyMatchSubstring === 'string' ? p.companyMatchSubstring : '',
                workBadge: wb,
                weekendBadge: weekendBadge,
                holidays: holidays
            };
        }

        function ingestAvatarExtensions(data) {
            siteAvatarMedia = normalizeAvatarMedia(data && data.avatarMedia);
            siteAvatarTap = normalizeAvatarTap(data && data.avatarTap);
            sitePresence = normalizePresence(data && data.presence);
            preloadAvatarThumb(siteAvatarMedia.thumbUrl);
        }

        var avatarMediaAppliedKey = '';

        function fetchImageAsync(url, timeoutMs) {
            return new Promise(function (resolve, reject) {
                if (!url) {
                    reject(new Error('empty url'));
                    return;
                }
                var img = new Image();
                var tid = window.setTimeout(function () {
                    tid = null;
                    reject(new Error('timeout'));
                }, timeoutMs || 12000);
                img.decoding = 'async';
                function finish(ok) {
                    if (tid !== null) {
                        window.clearTimeout(tid);
                        tid = null;
                    }
                    if (ok) resolve(img);
                    else reject(new Error('load failed'));
                }
                img.onload = function () {
                    finish(true);
                };
                img.onerror = function () {
                    finish(false);
                };
                img.src = url;
            });
        }

        function wireProgressiveAvatarStack(stack, thumb, full, media) {
            var clarifyScheduled = false;

            stack.classList.remove('is-sharp', 'full-loaded', 'thumb-ready', 'thumb-hidden');
            stack.classList.add('is-loading');
            thumb.removeAttribute('src');
            full.removeAttribute('src');

            function beginClarifyTransition() {
                if (clarifyScheduled) return;
                if (!stack.classList.contains('thumb-ready')) return;
                if (!(full.complete && full.naturalWidth > 0)) return;
                clarifyScheduled = true;

                stack.classList.add('thumb-hidden', 'full-loaded');

                if (prefersReducedMotion()) {
                    stack.classList.add('is-sharp');
                    stack.classList.remove('is-loading');
                    return;
                }

                requestAnimationFrame(function () {
                    stack.classList.add('is-sharp');
                    stack.classList.remove('is-loading');
                });
            }

            function attachFullAndClarify(url) {
                full.src = url;
                if (full.complete && full.naturalWidth > 0) {
                    beginClarifyTransition();
                    return;
                }
                full.addEventListener('load', beginClarifyTransition, { once: true });
                full.addEventListener('error', beginClarifyTransition, { once: true });
            }

            function markThumbReady(thumbUrl) {
                if (stack.classList.contains('thumb-ready')) return;
                thumb.src = thumbUrl;
                stack.classList.add('thumb-ready');
            }

            function beginFullFetch() {
                fetchImageAsync(media.fullUrl, 15000)
                    .then(function () {
                        attachFullAndClarify(media.fullUrl);
                    })
                    .catch(function () {
                        if (media.fallbackUrl) {
                            fetchImageAsync(media.fallbackUrl, 15000).then(function () {
                                attachFullAndClarify(media.fallbackUrl);
                            }).catch(function () {
                                attachFullAndClarify(media.fallbackUrl);
                            });
                            return;
                        }
                        attachFullAndClarify(media.fullUrl);
                    });
            }

            function loadThumbThenFull() {
                fetchImageAsync(media.thumbUrl, 8000)
                    .then(function () {
                        markThumbReady(media.thumbUrl);
                        beginFullFetch();
                    })
                    .catch(function () {
                        if (media.fallbackUrl) {
                            fetchImageAsync(media.fallbackUrl, 8000)
                                .then(function () {
                                    markThumbReady(media.fallbackUrl);
                                    beginFullFetch();
                                })
                                .catch(function () {
                                    markThumbReady(media.thumbUrl);
                                    beginFullFetch();
                                });
                            return;
                        }
                        markThumbReady(media.thumbUrl);
                        beginFullFetch();
                    });
            }

            window.setTimeout(loadThumbThenFull, 0);
        }

        function applyAvatarUrlsToStacks() {

        function findHolidayToday(holidays) {
            if (!Array.isArray(holidays)) return null;
            var d = new Date();
            var m = d.getMonth() + 1;
            var day = d.getDate();
            var cur = m * 100 + day;
            for (var i = 0; i < holidays.length; i++) {
                var h = holidays[i];
                if (!h || typeof h.startMonth !== 'number') continue;
                var sm = h.startMonth;
                var sd = typeof h.startDay === 'number' ? h.startDay : 1;
                var em = typeof h.endMonth === 'number' ? h.endMonth : sm;
                var ed = typeof h.endDay === 'number' ? h.endDay : sd;
                var start = sm * 100 + sd;
                var end = em * 100 + ed;
                if (cur >= start && cur <= end) return h;
            }
            return null;
        }

        function isWeekdayLocal(date) {
            var d = date || new Date();
            var day = d.getDay();
            return day >= 1 && day <= 5;

        function isWeekendLocal(date) {

            return day === 0 || day === 6;

            var legal = p.companyLegalName || '';

            return legal.indexOf(sub) !== -1;

        function attachPresenceHintHandlers(el, hintsList) {
            var hints = Array.isArray(hintsList) ? hintsList.filter(Boolean) : [];
            var hintEl = el.querySelector('.avatar-presence-badge__hint');
            var hintIndex = 0;
            var canHover = window.matchMedia('(hover: hover)').matches;

            function paintHint() {
                if (!hintEl || !hints.length) return;
                hintEl.textContent = hints[hintIndex % hints.length];
                hintIndex = (hintIndex + 1) % hints.length;
            }

            function showHint() {
                paintHint();
                el.classList.add('is-hint-on');
            }

            function hideHint() {
                el.classList.remove('is-hint-on');
            }

            if (canHover) {
                el.addEventListener('mouseenter', showHint);
                el.addEventListener('mouseleave', hideHint);
                el.addEventListener('focusin', showHint);
                el.addEventListener('focusout', hideHint);
            }

            el.addEventListener('click', function (e) {
                e.stopPropagation();
                if (!hints.length) {
                    hideHint();
                    return;

                if (!canHover) {
                    if (el.classList.contains('is-hint-on')) {
                        paintHint();
                    } else {
                        showHint();
                    }
                    return;
                }
                hideHint();
            });

            var hit = el.querySelector('.avatar-presence-badge__hit');

                    e.preventDefault();
                    e.stopPropagation();
                });

        function mountPresenceBadgeWithHint(el, variant, hints, renderHit) {
            var hintsList = [];

            el.removeAttribute('hidden');
            el.classList.add('avatar-presence-badge--hinted', 'avatar-presence-badge--' + variant);

        function renderPresenceBadge() {
            var el = document.getElementById('avatar-presence-badge');
            if (!el) return;
            el.innerHTML = '';
            el.className = 'avatar-presence-badge';
            el.removeAttribute('title');
            el.removeAttribute('tabindex');
            el.removeAttribute('aria-describedby');
            el.removeAttribute('role');

            if (!sitePresence) {
                el.setAttribute('hidden', '');
                return;
            }

            var hol = findHolidayToday(sitePresence.holidays);
            if (hol && hol.icon) {
                var holHints = hol.hoverHints && hol.hoverHints.length ? hol.hoverHints : hol.hoverHint || hol.title || '';
                mountPresenceBadgeWithHint(el, 'holiday', holHints, function (hit) {
                    renderPresenceBadgeIcon(hit, { icon: hol.icon }, 'holiday');
                });
                return;
            }

            if (shouldShowWeekendBadge(sitePresence)) {
                var we = sitePresence.weekendBadge || {};
                mountPresenceBadgeWithHint(el, 'weekend', we.hoverHints || [], function (hit) {
                    renderPresenceBadgeIcon(
                        hit,
                        { icon: we.icon || 'home', iconClass: we.iconClass },
                        'weekend'
                    );
                });
                return;
            }

            if (shouldShowWorkBadge(sitePresence)) {
                var wb = sitePresence.workBadge || {};
                mountPresenceBadgeWithHint(el, 'work', wb.hoverHints || [], function (hit) {
                    renderPresenceBadgeIcon(
                        hit,
                        { icon: wb.icon || 'briefcase', iconClass: wb.iconClass },
                        'work'
                    );
                });
                return;
            }

            el.setAttribute('hidden', '');
        }

        var mainIntroAnimComplete = false;
        var avatarFlairHideTimer = null;
        var avatarTapPhraseIndex = 0;
        var headerFlairDistortRaf = null;
        var lastHeaderFlairShiftRem = null;

        var HEADER_FLAIR_DISTORT = {
            duration: 1500,
            maxScale: 28,
            maxBlur: 3,
            blurFadePortion: 0.28,
            baseFreqX: 0.048,
            baseFreqY: 0.095,
            extraSpacing: 0.05

        function headerFlairBaseLetterSpacingEm() {
            var lang = document.documentElement.lang || '';
            return /^en/i.test(lang) ? 0.052 : 0.06;
        }

        /** 大屏 + 可悬停设备才用湍流/逐字动画（手机仅淡入） */
        function shouldUseHeaderFlairMotion() {
            if (prefersReducedMotion()) return false;
            return window.matchMedia('(min-width: 768px) and (hover: hover)').matches;
        }

        /** 每次点击随机垂直偏移，且与上一次拉开差距 */
        function pickHeaderFlairShiftRem() {
            var wide = shouldUseHeaderFlairMotion();
            var min = wide ? -4 : -2.25;
            var max = wide ? 4 : 2.25;
            var step = 0.25;
            var shift = 0;
            var attempts = 0;
            do {
                shift = min + Math.random() * (max - min);
                shift = Math.round(shift / step) * step;
                attempts += 1;
            } while (
                lastHeaderFlairShiftRem !== null &&
                Math.abs(shift - lastHeaderFlairShiftRem) < 1.1 &&
                attempts < 14
            );
            lastHeaderFlairShiftRem = shift;
            return shift.toFixed(2);
        }

        function headerFlairShiftTransform(line, scale) {
            var shift = line.style.getPropertyValue('--flair-shift') || '0rem';
            return 'translateY(' + shift.trim() + ') scale(' + scale + ')';
        }

        function cancelHeaderFlairDistort() {
            if (headerFlairDistortRaf) {
                cancelAnimationFrame(headerFlairDistortRaf);
                headerFlairDistortRaf = null;
            }
        }

        function getHeaderFlairDistortNodes() {
            return {
                turbulence: document.getElementById('header-flair-turbulence'),
                displacement: document.getElementById('header-flair-displacement')
            };
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function setHeaderFlairCharVars(span) {
            var twist = (Math.random() * 14 - 7).toFixed(1);
            var lift = (Math.random() * 0.2 + 0.28).toFixed(2);
            span.style.setProperty('--twist-r', twist + 'deg');
            span.style.setProperty('--lift', lift + 'em');
        }

        function fillHeaderFlairChars(line, text) {
            line.textContent = '';
            var idx = 0;
            segmentQuoteGlyphs(text).forEach(function (seg) {
                if (!seg.animate) {
                    line.appendChild(document.createTextNode(seg.text));
                    return;
                }
                var span = document.createElement('span');
                span.className = 'header-flair-char';
                span.textContent = seg.text;
                setHeaderFlairCharVars(span);
                span.style.setProperty('--fi', String(idx));
                idx += 1;
                line.appendChild(span);
            });
            return idx;
        }

        /** 整句 SVG 湍流（模糊快速消退）+ 逐字上下跳动归位 */
        function runHeaderFlairDistortIn(line, done) {
            var nodes = getHeaderFlairDistortNodes();
            var cfg = HEADER_FLAIR_DISTORT;
            var baseSpacing = headerFlairBaseLetterSpacingEm();

            cancelHeaderFlairDistort();

            if (!nodes.turbulence || !nodes.displacement || !shouldUseHeaderFlairMotion()) {
                line.classList.remove('is-distorting', 'is-out');
                line.classList.add('is-sharp', 'is-live');
                line.style.filter = '';
                line.style.opacity = '1';
                line.style.transform = headerFlairShiftTransform(line, 1);
                line.style.letterSpacing = baseSpacing + 'em';
                if (done) done();
                return;
            }

            var turbSeed = 2 + Math.floor(Math.random() * 16);
            nodes.turbulence.setAttribute('seed', String(turbSeed));
            line.classList.remove('is-sharp', 'is-out');
            line.classList.add('is-distorting');

            requestAnimationFrame(function () {
                line.classList.add('is-live');
            });

            line.style.letterSpacing = baseSpacing + cfg.extraSpacing + 'em';

            var start = performance.now();

            function frame(now) {
                var raw = Math.min((now - start) / cfg.duration, 1);
                var progress = easeOutCubic(raw);
                var turbulence = 1 - progress;

                var blurPhase = Math.min(1, progress / cfg.blurFadePortion);
                var blurAmount = cfg.maxBlur * (1 - easeOutCubic(blurPhase));

                nodes.displacement.setAttribute('scale', String(cfg.maxScale * turbulence));
                nodes.turbulence.setAttribute(
                    'baseFrequency',
                    cfg.baseFreqX + 0.04 * turbulence + ' ' + (cfg.baseFreqY + 0.08 * turbulence)
                );
                nodes.turbulence.setAttribute('seed', String(turbSeed + Math.floor(progress * 22)));

                if (blurAmount > 0.08) {
                    line.style.filter =
                        'url(#header-flair-distort-filter) blur(' + blurAmount.toFixed(2) + 'px)';
                } else {
                    line.style.filter = 'url(#header-flair-distort-filter)';
                }

                line.style.opacity = String(0.55 + progress * 0.45);
                line.style.transform = headerFlairShiftTransform(line, 1 + 0.03 * turbulence);
                line.style.letterSpacing = baseSpacing + cfg.extraSpacing * turbulence + 'em';

                if (raw < 1) {
                    headerFlairDistortRaf = requestAnimationFrame(frame);
                    return;
                }

                headerFlairDistortRaf = null;
                line.classList.remove('is-distorting');
                line.classList.add('is-sharp');
                line.style.filter = 'none';
                line.style.opacity = '1';
                line.style.transform = headerFlairShiftTransform(line, 1);
                line.style.letterSpacing = baseSpacing + 'em';
                if (done) done();
            }

            headerFlairDistortRaf = requestAnimationFrame(frame);
        }

        function hideHeaderFlairLine(line, host) {
            cancelHeaderFlairDistort();
            line.style.filter = 'none';
            line.classList.remove('is-distorting', 'is-sharp', 'is-live');

                if (host.contains(line)) host.removeChild(line);

        function showHeaderFlairSimple(line) {

            line.classList.add('header-flair-line--simple', 'is-sharp');
            line.style.filter = 'none';
            line.style.letterSpacing = baseSpacing + 'em';
            line.style.transform = headerFlairShiftTransform(line, 1);

        /** 每次点击随机左/右浮现一句（文案来自 config） */
        function playAvatarFlair() {
            var list = siteAvatarTap.bubbles;
            if (!list.length) return;

            var leftHost = document.getElementById('header-flair-left');
            var rightHost = document.getElementById('header-flair-right');
            if (!leftHost || !rightHost) return;

            var phrase = list[avatarTapPhraseIndex % list.length];
            avatarTapPhraseIndex += 1;

            var host = Math.random() < 0.5 ? leftHost : rightHost;
            var useMotion = shouldUseHeaderFlairMotion();

            cancelHeaderFlairDistort();
            clearTimeout(avatarFlairHideTimer);
            leftHost.innerHTML = '';
            rightHost.innerHTML = '';

            var line = document.createElement('p');
            line.className = 'header-flair-line';
            line.style.setProperty('--flair-shift', pickHeaderFlairShiftRem() + 'rem');
            host.appendChild(line);

            var glyphCount = 0;
            if (useMotion) {
                glyphCount = fillHeaderFlairChars(line, phrase.text);
                runHeaderFlairDistortIn(line);
            } else {
                line.textContent = phrase.text;
                showHeaderFlairSimple(line);
            }

            var dwellMs;
            if (!useMotion) {
                dwellMs = 2600;
            } else if (prefersReducedMotion()) {
                dwellMs = 2800;
            } else {
                dwellMs = Math.max(3600, HEADER_FLAIR_DISTORT.duration + glyphCount * 42 + 900);
            }
            avatarFlairHideTimer = setTimeout(function () {
                hideHeaderFlairLine(line, host);
            }, dwellMs);
        }

        function bindHeaderAvatarInteractions() {

        /**
         * 与当前页面所在「目录」解析 config.zh.json / config.en.json 等。
         * 避免 GitHub Pages 类地址为 …/repo（无尾斜杠）时相对路径落到站点根目录 404。
         */
        function resolveAssetUrl(filename) {
            const baseEl = document.querySelector('base[href]');
            if (baseEl && baseEl.href) {
                return new URL(filename, baseEl.href).href;
            }
            let path = window.location.pathname || '/';
            if (!path.endsWith('/')) {
                const last = path.split('/').pop() || '';
                if (/\.[a-z0-9]+$/i.test(last)) {
                    path = path.replace(/\/[^/]+$/, '/');
                } else {
                    path = path + '/';
                }
            }
            return new URL(filename, window.location.origin + path).href;
        }

        function localeFromNavigator() {
            const nav = (navigator.languages && navigator.languages[0]) || navigator.language || '';
            return /^zh/i.test(nav) ? 'zh' : 'en';
        }

        async function resolveSiteLocale() {
            const ctrl = new AbortController();
            const tid = setTimeout(function () {
                ctrl.abort();
            }, 2800);
            try {
                const res = await fetch('https://get.geojs.io/v1/ip/country.json', {
                    signal: ctrl.signal,
                    cache: 'no-store'
                });
                if (!res.ok) throw new Error('geo http');
                const geo = await res.json();
                const code = String(geo.country || geo.country_code || '').toUpperCase();
                if (code === 'CN') return 'zh';
                return 'en';
            } catch (e) {
                return localeFromNavigator();
            } finally {
                clearTimeout(tid);
            }
        }

            if (!Array.isArray(data.contentLinks) || data.contentLinks.length === 0) return false;
            if (!quoteConfigHasItems(data.quotes)) return false;

        function filterQuotesList(list) {
            return (Array.isArray(list) ? list : []).filter(function (q) {
